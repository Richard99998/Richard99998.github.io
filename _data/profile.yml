short_bio: >-
  <p>
    I am a final-year undergraduate student at 
    <a href="https://math.sustech.edu.cn/?lang=en" target="_blank" rel="noopener noreferrer">Southern University of Science and Technology</a> (SUSTech) in Shenzhen, China. 
    I am also a member of the Fields Honor Class, an elite program for mathematics undergraduates.
  </p>
  
  <p>
    My research interests lie at the intersection of optimization, graph learning, and machine learning, with a particular focus on theoretical foundations. To be precise, I am interested in the following problems:
  </p>
  
  <ol style="margin-bottom: 1em; padding-left: 20px;">
    <li>
      How can the inductive bias of optimization problems be leveraged to design learning-based architectures that achieve <em>both universality and efficiency (in terms of training and generalization)</em>?
    </li>
    <li>
      How can we design computationally efficient methods that guarantee solution feasibility, even in non-convex settings?
    </li>
  </ol>
  
  <p>
    I am very fortunate to work with <a href="https://emliang.github.io/" target="_blank" rel="noopener noreferrer">Enming Liang</a> and be supervised by <a href="https://www.mhchen.com/index.html" target="_blank" rel="noopener noreferrer">Minghua Chen</a>.
  </p>
