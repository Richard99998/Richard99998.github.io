short_bio: >-
  <p>
   I will be commencing my postgraduate studies at the <a href="https://sds.cuhk.edu.cn/en" target="_blank" rel="noopener noreferrer">School of Data Science</a> 
   at The Chinese University of Hong Kong, Shenzhen, an institution dedicated to cutting-edge research and innovation in data science.
    Previously, I was an undergraduate student at 
    <a href="https://math.sustech.edu.cn/?lang=en" target="_blank" rel="noopener noreferrer">Southern University of Science and Technology</a> (SUSTech) in Shenzhen, China. 
    I was also a member of the Fields Honor Class, an elite program for mathematics undergraduates which is led by the Fields Award winner Efim Zelmanov. During my undergraduate career,
    I was very fortunate to meet <a href="https://www.mhchen.com/index.html" target="_blank" rel="noopener noreferrer">Prof. Minghua Chen</a>, <a href="https://scholar.google.com/citations?user=QNOTvgkAAAAJ&hl=en&oi=ao" target="_blank" rel="noopener noreferrer">Prof. Jiang Yang</a>,  <a href="https://www.sustech.edu.cn/zh/faculties/zhangzhen.html" target="_blank" rel="noopener noreferrer">Prof. Zhen Zhang</a>, and <a href="https://scholar.google.com/citations?user=VWYT_7YAAAAJ&hl=en&oi=ao" target="_blank" rel="noopener noreferrer">Prof. Jin Zhang</a>, who help me a lot in the study of applied mathematics.
  </p>
  
  <p>
    My research interests lie at the intersection of optimization, graph learning, and machine learning, with a particular focus on theoretical foundations. To be precise, I am interested in the following problems:
  </p>
  
  <ol style="margin-bottom: 1em; padding-left: 20px;">
    <li>
      How can the inductive bias of optimization problems be leveraged to design learning-based architectures that achieve <em>both universality and efficiency (in terms of training and generalization)</em>?
    </li>
    <li>
      How can we design computationally efficient methods that guarantee solution feasibility, even in non-convex settings?
    </li>
    <li>
      How can we design interpretable methods for learning to optimize that extend beyond deep unrolling?
    </li>
  </ol>
  
  <p>
    I am very fortunate to work with <a href="https://emliang.github.io/" target="_blank" rel="noopener noreferrer">Enming Liang</a> and be supervised by <a href="https://www.mhchen.com/index.html" target="_blank" rel="noopener noreferrer">Prof. Minghua Chen</a>.
  </p>
