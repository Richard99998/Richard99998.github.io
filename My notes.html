    }

<div id="notes-container">
    
    <div style="text-align: center; margin-bottom: 20px;">
        <h1 style="margin-bottom: 10px;">My Notes</h1>
        <p style="color: #666;">Mathematical Insights & Research</p>
    </div>

    <div class="toggle-container">
        <button id="btn-class" class="toggle-btn active" onclick="switchView('class')">By Class</button>
        <button id="btn-date" class="toggle-btn" onclick="switchView('date')">By Date</button>
    </div>

    <div id="back-btn-container">
        <button class="back-btn" onclick="goBackToClasses()">
            <span>← Back to Folders</span>
        </button>
    </div>

    <div id="content-area"></div>

</div>

<script src="notes_data.js"></script>

<script>
    const contentArea = document.getElementById('content-area');
    const backBtnContainer = document.getElementById('back-btn-container');
    const btnClass = document.getElementById('btn-class');
    const btnDate = document.getElementById('btn-date');

    let currentView = 'class'; 

    // 初始化：确保 DOM 加载后再执行
    document.addEventListener("DOMContentLoaded", function() {
        renderClassView();
    });

    // 切换视图
    function switchView(view) {
        currentView = view;
        
        if (view === 'class') {
            btnClass.classList.add('active');
            btnDate.classList.remove('active');
            backBtnContainer.style.display = 'none';
            renderClassView();
        } else {
            btnClass.classList.remove('active');
            btnDate.classList.add('active');
            backBtnContainer.style.display = 'none';
            renderDateView();
        }
    }

    // 渲染文件夹
    function renderClassView() {
        contentArea.innerHTML = '';
        
        if (typeof notesData === 'undefined') {
            contentArea.innerHTML = '<p style="text-align:center; color:red;">Error: notes_data.js not loaded. Please check file name.</p>';
            return;
        }

        const categories = [...new Set(notesData.map(item => item.category))];
        
        categories.forEach(cat => {
            const count = notesData.filter(item => item.category === cat).length;
            
            const card = document.createElement('div');
            card.className = 'note-card folder-card';
            card.onclick = () => openCategory(cat);
            
            card.innerHTML = `
                <h3 class="folder-title">${cat}</h3>
                <div class="folder-info">
                    <span>${count} Notes</span>
                    <span>View ></span>
                </div>
            `;
            contentArea.appendChild(card);
        });
    }

    // 渲染分类详情
    function openCategory(category) {
        contentArea.innerHTML = '';
        backBtnContainer.style.display = 'block';
        
        const notes = notesData.filter(item => item.category === category);
        
        notes.forEach(note => {
            const card = createNoteCard(note);
            contentArea.appendChild(card);
        });
    }

    // 返回
    function goBackToClasses() {
        backBtnContainer.style.display = 'none';
        renderClassView();
    }

    // 渲染日期视图
    function renderDateView() {
        contentArea.innerHTML = '';
        const sortedNotes = [...notesData].sort((a, b) => new Date(b.date) - new Date(a.date));
        
        let lastMonth = '';
        
        sortedNotes.forEach(note => {
            const currentMonth = note.date.substring(0, 7);
            
            if (currentMonth !== lastMonth) {
                const divider = document.createElement('div');
                divider.className = 'date-divider';
                divider.innerText = currentMonth;
                contentArea.appendChild(divider);
                lastMonth = currentMonth;
            }
            
            const card = createNoteCard(note);
            contentArea.appendChild(card);
        });
    }

    // 创建卡片 HTML
    function createNoteCard(note) {
        // 创建链接元素，这样点击可以新窗口打开
        const card = document.createElement('a');
        card.className = 'note-card';
        card.href = note.file;
        card.target = "_blank"; // 新标签页打开
        
        card.innerHTML = `
            <div>
                <h3 class="file-title">${note.title}</h3>
            </div>
            <div class="file-meta">
                <span style="background:#f1f1f1; padding:2px 6px; border-radius:4px;">${note.category}</span>
                <span>${note.date}</span>
            </div>
        `;
        return card;
    }
</script>
