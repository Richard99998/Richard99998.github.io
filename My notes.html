---
layout: default
title: My Notes
navbar_title: My Notes
body_attr: >-
  data-spy="scroll" data-target="#navbar-year" data-offset="100"
---

<style>
    /* 1. 背景图片设置 */
    body {
        /* 请把下面的链接换成你自己的图片URL，或者放在 assets/img/bg.jpg */
        background-image: url('https://github.com/Richard99998/Richard99998.github.io/blob/main/BG.jpg?q=80&w=1920&auto=format&fit=crop');
        background-size: cover;
        background-attachment: fixed;
        background-position: center;
    }

    /* 为了让文字在背景上看得清，给容器加个半透明白底 */
    #notes-main-container {
        background: rgba(255, 255, 255, 0.92); /* 0.92 是透明度 */
        border-radius: 12px;
        padding: 30px;
        margin: 30px auto;
        max-width: 1100px;
        min-height: 80vh;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    /* 2. 搜索框样式 */
    .search-wrapper {
        position: relative;
        max-width: 500px;
        margin: 0 auto 30px;
    }

    #search-input {
        width: 100%;
        padding: 12px 20px;
        border: 2px solid #eee;
        border-radius: 30px;
        font-size: 1rem;
        outline: none;
        transition: border-color 0.3s;
    }

    #search-input:focus {
        border-color: #2980b9;
    }

    /* 3. 面包屑导航 (Home > Optimization > Convex) */
    .breadcrumb {
        display: flex;
        gap: 8px;
        font-size: 1rem;
        color: #666;
        margin-bottom: 20px;
        align-items: center;
    }

    .breadcrumb span {
        cursor: pointer;
        color: #2980b9;
    }
    
    .breadcrumb span:hover { text-decoration: underline; }
    .breadcrumb span.current { color: #999; cursor: default; text-decoration: none; }
    .breadcrumb-separator { color: #ccc; }

    /* 4. 文件夹介绍区域 */
    #folder-intro {
        background: #f0f7fb;
        border-left: 4px solid #2980b9;
        padding: 15px 20px;
        margin-bottom: 30px;
        border-radius: 0 8px 8px 0;
        color: #444;
        font-size: 0.95rem;
        display: none; /* 默认隐藏 */
    }

    /* 网格布局 */
    #content-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 20px;
    }

    /* 卡片样式 */
    .item-card {
        background: #fff;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        border: 1px solid #eee;
        transition: transform 0.2s, box-shadow 0.2s;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        height: 140px;
        position: relative;
    }

    .item-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 16px rgba(0,0,0,0.1);
    }

    /* 文件夹图标样式 */
    .type-folder { border-top: 4px solid #f1c40f; }
    .folder-icon { font-size: 2rem; margin-bottom: 10px; color: #f1c40f; }
    
    /* 文件图标样式 */
    .type-file { border-top: 4px solid #2980b9; }
    
    .card-title { font-weight: 600; font-size: 1.1rem; margin-bottom: 5px; color: #333; }
    .card-meta { font-size: 0.8rem; color: #888; margin-top: auto; }
</style>

<div id="notes-main-container">
    
    <h1 style="text-align:center; margin-bottom:10px;">My Notes</h1>
    
    <div class="search-wrapper">
        <input type="text" id="search-input" placeholder="Search notes (e.g., 'convex', 'pde')..." oninput="handleSearch()">
    </div>

    <div id="breadcrumb" class="breadcrumb">
        </div>

    <div id="folder-intro"></div>

    <div id="content-grid"></div>

</div>

<script src="notes_data.js"></script>

<script>
    // 状态变量
    let currentPath = []; // 当前所在的路径，例如 ['Optimization', 'Convex']
    let searchQuery = "";

    const grid = document.getElementById('content-grid');
    const breadcrumbEl = document.getElementById('breadcrumb');
    const introEl = document.getElementById('folder-intro');

    // 初始化
    document.addEventListener("DOMContentLoaded", () => {
        render();
    });

    // 搜索处理
    function handleSearch() {
        searchQuery = document.getElementById('search-input').value.toLowerCase();
        render();
    }

    // 导航到指定路径
    function navigateTo(pathArray) {
        currentPath = pathArray;
        document.getElementById('search-input').value = ""; // 进文件夹时清空搜索
        searchQuery = "";
        render();
    }

    // 核心渲染函数
    function render() {
        grid.innerHTML = '';
        renderBreadcrumbs();
        renderIntro();

        // 1. 如果有搜索词，显示所有匹配的文件（忽略文件夹结构）
        if (searchQuery) {
            const matches = notesData.filter(note => 
                note.title.toLowerCase().includes(searchQuery) || 
                note.category.toLowerCase().includes(searchQuery)
            );
            
            if (matches.length === 0) {
                grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:#999;">No notes found matching your search.</p>';
                return;
            }

            matches.forEach(note => createCard(note, 'file'));
            return;
        }

        // 2. 如果没有搜索，按层级显示
        const currentPathStr = currentPath.join('/');
        const foldersToShow = new Set();
        const filesToShow = [];

        notesData.forEach(note => {
            // 检查笔记是否属于当前路径
            if (note.category === currentPathStr) {
                // 精确匹配：是当前文件夹下的文件
                filesToShow.push(note);
            } else if (note.category.startsWith(currentPathStr + (currentPathStr ? '/' : ''))) {
                // 前缀匹配：是子文件夹里的内容
                // 提取下一级文件夹名称
                const remaining = note.category.substring(currentPathStr.length + (currentPathStr ? 1 : 0));
                const nextFolder = remaining.split('/')[0];
                if (nextFolder) {
                    foldersToShow.add(nextFolder);
                }
            } else if (currentPath.length === 0 && !note.category.includes('/')) {
                // 根目录特殊处理：直接放在根目录的文件
                // 现在的逻辑假设所有根目录的都叫 "Category"，所以这行通常用来处理没有 / 的category
                if (note.category.indexOf('/') === -1) {
                   // 实际上在你的数据结构里，顶级也是文件夹（如 Optimization），所以这里通常是提取 Optimization
                   foldersToShow.add(note.category.split('/')[0]);
                }
            } else if (currentPath.length === 0) {
                // 根目录下，提取所有顶层文件夹
                foldersToShow.add(note.category.split('/')[0]);
            }
        });

        // 渲染文件夹卡片
        Array.from(foldersToShow).sort().forEach(folderName => {
            createCard({ title: folderName }, 'folder');
        });

        // 渲染文件卡片
        filesToShow.forEach(note => {
            createCard(note, 'file');
        });

        if (filesToShow.length === 0 && foldersToShow.size === 0) {
             grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:#999;">This folder is empty.</p>';
        }
    }

    // 渲染面包屑
    function renderBreadcrumbs() {
        let html = `<span onclick="navigateTo([])">Home</span>`;
        
        let pathAccumulator = [];
        currentPath.forEach((folder, index) => {
            pathAccumulator.push(folder);
            // 这里的 [...pathAccumulator] 是为了闭包保存当前状态
            const pathCopy = [...pathAccumulator]; 
            html += ` <span class="breadcrumb-separator">/</span> `;
            
            if (index === currentPath.length - 1) {
                html += `<span class="current">${folder}</span>`;
            } else {
                // 哪怕是简单的字符串拼接，也需要处理点击事件，这里用 dataset 比较方便，或者直接重新渲染
                // 为了简单，我们重新构建 onclick
                html += `<span onclick='navigateTo(${JSON.stringify(pathCopy)})'>${folder}</span>`;
            }
        });
        
        breadcrumbEl.innerHTML = html;
    }

    // 渲染介绍文字
    function renderIntro() {
        const pathStr = currentPath.join('/');
        // 从 folderInfo 里读取介绍，如果没有则不显示
        if (pathStr && folderInfo && folderInfo[pathStr]) {
            introEl.innerHTML = `<strong>About ${currentPath[currentPath.length-1]}:</strong> ${folderInfo[pathStr]}`;
            introEl.style.display = 'block';
        } else {
            introEl.style.display = 'none';
        }
    }

    // 创建卡片 DOM
    function createCard(item, type) {
        const div = document.createElement('div');
        div.className = `item-card type-${type}`;
        
        if (type === 'folder') {
            div.innerHTML = `
                <div>
                    <div class="folder-icon">📁</div>
                    <div class="card-title">${item.title}</div>
                </div>
                <div class="card-meta">Folder</div>
            `;
            div.onclick = () => {
                const newPath = [...currentPath, item.title];
                navigateTo(newPath);
            };
        } else {
            // 文件
            div.innerHTML = `
                <div>
                    <div style="color:#2980b9; margin-bottom:10px; font-size:1.5rem">📄</div>
                    <div class="card-title">${item.title}</div>
                </div>
                <div class="card-meta">
                    <span>${item.date}</span>
                </div>
            `;
            div.onclick = () => window.open(item.file, '_blank');
        }
        
        grid.appendChild(div);
    }
</script>
